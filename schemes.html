<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheme Directory | SchemeChecker</title>
    <meta name="description" content="Browse all Indian Government schemes filtered by category, search by name or ministry.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="umang-header">
        <h1 class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">🏛️ SchemeChecker</h1>
        <div class="header-controls">
            <a href="index.html" class="nav-link" style="color:var(--primary-blue); font-weight:600; text-decoration:none; margin-right:1rem; font-size:0.95rem;">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="saved.html" class="nav-link" style="color:var(--primary-blue); font-weight:600; text-decoration:none; margin-right:1rem; font-size:0.95rem;">
                <i class="fas fa-bookmark"></i> Saved
            </a>
            <select id="language-switcher" class="lang-select" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="hi">हिंदी</option>
                <option value="mr">मराठी</option>
            </select>
        </div>
    </header>

    <main class="container">

        <!-- Page Title -->
        <div style="margin-bottom:1.5rem;">
            <h2 style="margin:0 0 0.25rem; font-size:1.6rem; color:var(--text-main);">All Government Schemes</h2>
            <p style="margin:0; color:var(--text-muted);">Browse and filter 150+ schemes across 10 categories</p>
        </div>

        <!-- Search Bar -->
        <div style="margin-bottom:1.25rem;">
            <input type="text" id="search-input" class="search-input" 
                placeholder="🔍  Search by scheme name, ministry or category..."
                style="max-width:100%; width:100%; padding:0.75rem 1.25rem; font-size:1rem; border-radius:10px;">
        </div>

        <!-- Category Filter Chips -->
        <div id="category-container" class="category-container">
            <button class="cat-chip active" data-cat="all">All</button>
            <button class="cat-chip" data-cat="agriculture">Agriculture</button>
            <button class="cat-chip" data-cat="education">Education</button>
            <button class="cat-chip" data-cat="healthcare">Healthcare</button>
            <button class="cat-chip" data-cat="finance">Finance</button>
            <button class="cat-chip" data-cat="housing">Housing</button>
            <button class="cat-chip" data-cat="employment">Employment</button>
            <button class="cat-chip" data-cat="women">Women & Child</button>
            <button class="cat-chip" data-cat="social">Social Welfare</button>
            <button class="cat-chip" data-cat="transport">Transport</button>
            <button class="cat-chip" data-cat="digital">Digital Services</button>
        </div>

        <!-- Compare Bar (hidden by default) -->
        <div id="compare-bar" style="display:none; background:var(--primary-blue); color:white; padding:0.75rem 1.5rem; border-radius:10px; margin-bottom:1.5rem; justify-content:space-between; align-items:center;">
            <span id="compare-label">0 schemes selected for comparison</span>
            <div style="display:flex; gap:0.75rem;">
                <button onclick="window.viewCompare()" style="background:white; color:var(--primary-blue); border:none; padding:0.4rem 1rem; border-radius:6px; cursor:pointer; font-weight:600;">Compare</button>
                <button onclick="window.clearCompare()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:0.4rem 1rem; border-radius:6px; cursor:pointer;">Clear</button>
            </div>
        </div>

        <!-- Results Count -->
        <div id="results-count" style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1rem;"></div>

        <!-- Scheme Cards Grid -->
        <div id="schemes-grid" class="schemes-layout">
            <div style="grid-column:1/-1; text-align:center; padding:3rem;">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem; color:var(--primary-blue);"></i>
                <p style="color:var(--text-muted); margin-top:1rem;">Loading schemes...</p>
            </div>
        </div>

    </main>

    <footer style="background:var(--bg-card); border-top:1px solid var(--border-color); padding:1.5rem 5%; text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:3rem;">
        SchemeChecker — Data sourced from official Indian government portals.
    </footer>

    <script src="js/schemesData.js"></script>
    <script src="js/app.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/listing.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
