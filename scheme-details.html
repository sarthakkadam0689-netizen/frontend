<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheme Details | SchemeChecker</title>
    <meta name="description" content="Full details, eligibility criteria, required documents, and application steps for this government scheme.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="umang-header">
        <h1 class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">🏛️ SchemeChecker</h1>
        <div class="header-controls">
            <a href="schemes.html" class="nav-link" style="color:var(--primary-blue); font-weight:600; text-decoration:none; margin-right:1rem; font-size:0.95rem;">
                <i class="fas fa-th-list"></i> Schemes
            </a>
            <a href="saved.html" class="nav-link" style="color:var(--primary-blue); font-weight:600; text-decoration:none; margin-right:1rem; font-size:0.95rem;">
                <i class="fas fa-bookmark"></i> Saved
            </a>
            <select id="language-switcher" class="lang-select" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="hi">हिंदी</option>
                <option value="mr">मराठी</option>
            </select>
        </div>
    </header>

    <main class="container">

        <!-- Back Navigation -->
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:2rem; flex-wrap:wrap;">
            <button onclick="window.history.back()" class="btn-outline">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <nav style="font-size:0.85rem; color:var(--text-muted);">
                <a href="index.html" style="color:var(--text-muted); text-decoration:none;">Home</a>
                <span style="margin:0 0.5rem;">›</span>
                <a href="schemes.html" style="color:var(--text-muted); text-decoration:none;">All Schemes</a>
                <span style="margin:0 0.5rem;">›</span>
                <span id="breadcrumb-name" style="color:var(--primary-blue); font-weight:500;">Details</span>
            </nav>
        </div>

        <!-- Dynamic content rendered by details.js -->
        <div id="details-render-target">
            <div style="text-align:center; padding:5rem 2rem;">
                <i class="fas fa-spinner fa-spin" style="font-size:2.5rem; color:var(--primary-blue);"></i>
                <p style="color:var(--text-muted); margin-top:1rem;">Loading scheme details...</p>
            </div>
        </div>

    </main>

    <footer style="background:var(--bg-card); border-top:1px solid var(--border-color); padding:1.5rem 5%; text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:3rem;">
        SchemeChecker — Data sourced from official Indian government portals.
    </footer>

    <!-- Load order: data → nav → i18n → details -->
    <script src="js/schemesData.js"></script>
    <script src="js/app.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/details.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
