<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Schemes | SchemeChecker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="umang-header">
        <h1 class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">🏛️ SchemeChecker</h1>
        <div class="header-controls">
            <a href="schemes.html" class="nav-link" style="color:var(--primary-blue); font-weight:600; text-decoration:none; margin-right:1rem; font-size:0.95rem;">
                <i class="fas fa-th-list"></i> Schemes
            </a>
            <select id="language-switcher" class="lang-select" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="hi">हिंदी</option>
                <option value="mr">मराठी</option>
            </select>
        </div>
    </header>

    <main class="container">
        <!-- Page Title -->
        <div style="margin-bottom:2rem; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:1rem;">
            <div>
                <h2 style="margin:0 0 0.25rem; font-size:1.8rem; color:var(--text-main);">
                    <i class="fas fa-bookmark" style="color:var(--primary-orange); margin-right:0.5rem;"></i> Saved Schemes
                </h2>
                <p style="margin:0; color:var(--text-muted);">Quickly access your bookmarked government services</p>
            </div>
            <div id="saved-count-badge" style="background:var(--bg-card); border:1px solid var(--border-color); padding:0.5rem 1rem; border-radius:8px; font-weight:600; color:var(--primary-blue);">
                0 schemes saved
            </div>
        </div>

        <!-- Saved Schemes Grid -->
        <div id="saved-schemes-grid" class="schemes-layout">
            <!-- Rendered by saved.js -->
            <div style="grid-column: 1/-1; text-align: center; padding: 5rem 2rem;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; color: var(--primary-blue);"></i>
                <p style="color:var(--text-muted); margin-top:1rem;">Retrieving your shortcuts...</p>
            </div>
        </div>
    </main>

    <footer style="background:var(--bg-card); border-top:1px solid var(--border-color); padding:1.5rem 5%; text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:3rem;">
        SchemeChecker — Your personal portal for government services.
    </footer>

    <!-- Scripts -->
    <script src="js/schemesData.js"></script>
    <script src="js/app.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/listing.js"></script>
    <script src="js/saved.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
